
<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>kly – Väder, Pollen och UV</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<div class="wrap">

<div class="header">
  <div class="brand">kly — Väder, Pollen och UV.</div>
  <div class="searchWrap">
    <span class="searchIcon">🔎</span>
    <input id="searchInput" placeholder="Sök stad (t.ex. Säfsen)">
    <button class="locBtn">📍</button>
    <div id="suggest" class="suggest"></div>
  </div>
</div>

<div class="card">
  <h1 id="cityName" class="cityTitle">Stockholm</h1>
  <div id="citySub" class="subtle"></div>

  <details class="summary">
    <summary>UV-index ▼</summary>
    <div class="content">
      <div class="uvChartWrap">
        <svg id="uvChart"></svg>
      </div>
    </div>
  </details>

  <details class="summary">
    <summary>Pollen ▼</summary>
    <div class="content" id="pollenBox"></div>
  </details>

  <div class="grid2">

    <details class="summary">
      <summary>Alla timmar idag ▼</summary>
      <div class="content">
        Scrollbar here (to be expanded)
      </div>
    </details>

    <details class="summary">
      <summary>10 dagars prognos ▼</summary>
      <div class="content">
        Vertical forecast here
      </div>
    </details>

  </div>

</div>

</div>

<script src="assets/app.js"></script>
</body>
</html>
