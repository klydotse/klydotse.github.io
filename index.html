<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kly.se – Vädret, helt enkelt.</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    :root { 
      --bg: #1e3a8a; 
      --glass: rgba(255, 255, 255, 0.1); 
      --glass-dark: rgba(0, 0, 0, 0.2);
      --glass-thick: rgba(255, 255, 255, 0.18);
      --border: rgba(255, 255, 255, 0.15); 
    }

    body {
      margin: 0; background: var(--bg);
      background: radial-gradient(circle at 50% 0%, #3b82f6 0%, #1e3a8a 70%, #0f172a 100%);
      background-attachment: fixed; color: white; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; 
      -webkit-font-smoothing: antialiased;
    }

    .kly-narrow { max-width: 550px; margin: 0 auto; padding: 0 15px; }
    
    /* Header & Search */
    header { display: flex; align-items: center; gap: 15px; padding: 25px 0; position: relative; }
    .search-pill { 
      background: rgba(255,255,255,0.12); border-radius: 50px; padding: 8px 18px; 
      border: 1px solid var(--border); flex-grow: 1; display: flex; align-items: center; gap: 10px;
      backdrop-filter: blur(10px);
    }
    .search-input { background: transparent; border: none; color: white; width: 100%; outline: none; font-weight: 600; }
    .search-input::placeholder { color: rgba(255,255,255,0.4); }

    .search-results { 
      position: absolute; top: 75px; left: 0; right: 0; background: #2563eb; 
      border-radius: 18px; z-index: 2000; overflow: hidden; border: 1px solid var(--border);
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    }
    .search-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
    .search-item:hover { background: rgba(255,255,255,0.15); }

    /* Card System */
    .kly-card { 
      background: var(--glass); backdrop-filter: blur(25px); border-radius: 26px; 
      border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px;
    }
    .kly-header { 
      background: var(--glass-thick); padding: 14px 20px; 
      font-size: 11px; font-weight: 800; letter-spacing: 1px; color: rgba(255,255,255,0.7);
      text-transform: uppercase; border-bottom: 1px solid var(--border);
    }

    /* Hero Metrics */
    .hero-temp { font-size: 6rem; font-weight: 900; letter-spacing: -5px; line-height: 1; }
    .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
    .pill { background: var(--glass-dark); padding: 12px; border-radius: 16px; font-size: 13px; font-weight: 700; text-align: center; }

    .insight-box { 
      background: var(--glass); padding: 20px; border-radius: 22px; font-weight: 700; 
      border-left: 6px solid #fbbf24; margin-bottom: 20px; font-size: 15px;
    }

    /* Hourly Row */
    .scroll-container { position: relative; }
    .hourly-row { display: flex; overflow-x: auto; gap: 22px; padding: 20px; scrollbar-width: none; }
    .hourly-row::-webkit-scrollbar { display: none; }
    .hour-item { min-width: 55px; text-align: center; }
    .floating-arrow { 
      position: absolute; right: 15px; top: 50%; transform: translateY(-50%); 
      background: rgba(255,255,255,0.25); border-radius: 50%; width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center; pointer-events: none;
      backdrop-filter: blur(8px); border: 1px solid var(--border); animation: pulse 2.5s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.3; transform: translateY(-50%) translateX(0); } 50% { opacity: 1; transform: translateY(-50%) translateX(-5px); } }

    /* Pollen Specifics */
    .pollen-row { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .pollen-bar { background: rgba(255,255,255,0.1); height: 8px; border-radius: 10px; flex-grow: 1; margin: 0 15px; overflow: hidden; }
    .pollen-fill { height: 100%; border-radius: 10px; width: 0; transition: width 1s ease-out; }
    .pollen-extra { display: none; }

    /* Table Reset */
    .table { color: white !important; margin: 0; background: transparent; }
    .table td { border-top: 1px solid rgba(255,255,255,0.06); padding: 16px 20px !important; vertical-align: middle; background: transparent !important; }
    .table th { border: none; padding: 12px 20px; font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; }
  </style>
</head>
<body>
  <header class="kly-narrow">
    <div class="brand">
      <div style="font-weight:900; font-size:30px; letter-spacing:-1.8px; line-height:1">kly.se</div>
      <div style="font-size:11px; opacity:0.8; font-weight:800; margin-top: 2px;">Vädret, helt enkelt.</div>
    </div>
    <div class="search-pill">
      <i class="bi bi-search opacity-50"></i>
      <input id="searchInput" type="text" placeholder="Sök stad..." autocomplete="off" class="search-input" />
      <div id="searchResults" class="search-results" hidden></div>
    </div>
  </header>

  <main class="kly-narrow">
    <section class="kly-card">
      <div class="p-4 pb-0 d-flex justify-content-between align-items-start">
        <div>
          <h1 id="placeName" class="m-0 fw-bold h3">Stockholm</h1>
          <div id="placeCounty" class="small opacity-60 fw-bold">Sverige</div>
        </div>
        <i id="heroIcon" class="bi bi-cloud-sun-fill fs-1 text-warning"></i>
      </div>
      <div class="p-4 pt-0 d-flex align-items-end gap-2 mt-2">
        <div class="hero-temp" id="tempNow">--</div><div class="fs-1 pb-2 opacity-30">°</div>
        <div class="pb-2 ms-3">
          <div id="weatherCond" class="fw-bold fs-4">--</div>
          <div class="small opacity-60 fw-bold">Känns som <span id="feelsLike">--</span>° | <span id="todayRange">--</span></div>
        </div>
      </div>
      <div class="mini-grid">
        <div class="pill"><i class="bi bi-wind"></i> <span id="wind">--</span> m/s</div>
        <div class="pill"><i class="bi bi-droplet"></i> <span id="humidity">--</span>% fukt</div>
        <div class="pill"><i class="bi bi-sunrise"></i> <span id="sunrise">--:--</span></div>
        <div class="pill"><i class="bi bi-sunset"></i> <span id="sunset">--:--</span></div>
      </div>
    </section>

    <div id="insightBox" class="insight-box">
      Laddar dagens insikter...
    </div>

    <section class="kly-card">
      <div class="kly-header">Prognos per timme</div>
      <div class="scroll-container">
        <div class="hourly-row" id="hourlyRow"></div>
        <div class="floating-arrow"><i class="bi bi-chevron-right"></i></div>
      </div>
    </section>

    <section class="kly-card">
      <div class="kly-header d-flex justify-content-between">
        <span>Pollenrapport</span>
        <span id="pollenSource" class="opacity-50" style="font-size: 9px;">Sverige</span>
      </div>
      <div id="pollenContainer"></div>
      <div class="p-3 text-center border-top border-white-10">
        <button onclick="togglePollen()" id="pBtn" class="btn btn-sm text-white fw-bold opacity-75">Visa alla plantor <i class="bi bi-chevron-down ms-1"></i></button>
      </div>
      <div class="p-4 pt-2 border-top border-white-10">
        <div class="small opacity-50 fw-bold mb-3">TREND (4 DAGAR)</div>
        <div class="d-flex justify-content-between text-center px-2" id="pollenTrend"></div>
      </div>
    </section>

    <section class="kly-card">
      <div class="kly-header">10-dygnsprognos</div>
      <table class="table table-borderless">
        <thead>
          <tr>
            <th class="ps-4">Dag</th>
            <th>Väder</th>
            <th class="text-end">Min / Max</th>
            <th class="text-end pe-4">Ned.</th>
          </tr>
        </thead>
        <tbody id="outlookRows" class="fw-bold"></tbody>
      </table>
    </section>

    <footer class="mt-4 text-center text-white-50 small pb-5 fw-bold">
      © 2026 kly.se · Data: Open-Meteo & Pollenkollen
    </footer>
  </main>

  <script>
    const $ = id => document.getElementById(id);
    let state = { lat: 59.3293, lon: 18.0686, name: "Stockholm", country: "SE" };

    const icons = {
      0: "bi-sun-fill text-warning",
      1: "bi-cloud-sun-fill text-warning", 2: "bi-cloud-sun-fill text-warning",
      3: "bi-clouds-fill opacity-60",
      45: "bi-cloud-fog-fill opacity-60", 48: "bi-cloud-fog-fill opacity-60",
      51: "bi-cloud-drizzle-fill text-info", 61: "bi-cloud-rain-fill text-info", 
      63: "bi-cloud-rain-fill text-info", 65: "bi-cloud-rain-heavy-fill text-info",
      71: "bi-cloud-snow-fill text-white", 95: "bi-cloud-lightning-rain-fill text-warning"
    };

    function getIcon(code) { return icons[code] || "bi-cloud-fill opacity-60"; }

    async function fetchWeather() {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${state.lat}&longitude=${state.lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m,is_day&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,uv_index_max,sunrise,sunset&hourly=temperature_2m,weather_code,uv_index,precipitation_probability&timezone=auto&forecast_days=10`;
      
      try {
        const res = await fetch(url);
        const data = await res.json();

        // Update Hero
        $("placeName").textContent = state.name;
        $("tempNow").textContent = Math.round(data.current.temperature_2m);
        $("feelsLike").textContent = Math.round(data.current.apparent_temperature);
        $("todayRange").textContent = `${Math.round(data.daily.temperature_2m_min[0])}° / ${Math.round(data.daily.temperature_2m_max[0])}°`;
        $("wind").textContent = Math.round(data.current.wind_speed_10m);
        $("humidity").textContent = Math.round(data.current.relative_humidity_2m);
        $("sunrise").textContent = data.daily.sunrise[0].split("T")[1];
        $("sunset").textContent = data.daily.sunset[0].split("T")[1];
        $("heroIcon").className = `bi ${getIcon(data.current.weather_code)} fs-1`;

        // Insight Logic
        const uvPeak = data.daily.uv_index_max[0];
        const rainProb = data.daily.precipitation_probability_max[0];
        let insight = `UV-topp på ${Math.round(uvPeak)} idag. `;
        insight += rainProb > 30 ? `Risk för regn (${rainProb}%). Ta med paraply!` : "Inget regn väntas idag.";
        $("insightBox").textContent = insight;

        // Hourly Row
        $("hourlyRow").innerHTML = data.hourly.time.slice(0, 24).map((t, i) => `
          <div class="hour-item">
            <div class="small fw-bold opacity-40">${t.split("T")[1]}</div>
            <div class="fw-bold my-1 fs-5">${Math.round(data.hourly.temperature_2m[i])}°</div>
            <i class="bi ${getIcon(data.hourly.weather_code[i])} fs-5"></i>
          </div>
        `).join("");

        // 10-Day Table
        $("outlookRows").innerHTML = data.daily.time.map((t, i) => {
          const d = new Date(t);
          return `
            <tr>
              <td class="ps-4">${i === 0 ? 'Idag' : d.toLocaleDateString('sv-SE', {weekday:'short'})}</td>
              <td><i class="bi ${getIcon(data.daily.weather_code[i])} fs-5"></i></td>
              <td class="text-end"><span class="opacity-40">${Math.round(data.daily.temperature_2m_min[i])}°</span> / ${Math.round(data.daily.temperature_2m_max[i])}°</td>
              <td class="text-end pe-4 text-info">${data.daily.precipitation_probability_max[i]}%</td>
            </tr>
          `;
        }).join("");

        fetchPollen();
      } catch (err) { console.error(err); }
    }

    async function fetchPollen() {
      const isSE = state.country === "SE";
      $("pollenSource").textContent = isSE ? "Sverige" : "Global API";
      
      const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${state.lat}&longitude=${state.lon}&hourly=birch_pollen,grass_pollen,alder_pollen,mugwort_pollen,oak_pollen,pine_pollen,ragweed_pollen&forecast_days=4&timezone=auto`;
      
      try {
        const res = await fetch(url);
        const data = await res.json();
        
        const types = [
          { name: "Björk", id: "birch_pollen" }, { name: "Gräs", id: "grass_pollen" }, { name: "Gråbo", id: "mugwort_pollen" },
          { name: "Al", id: "alder_pollen" }, { name: "Ek", id: "oak_pollen" }, { name: "Tall", id: "pine_pollen" },
          { name: "Hassel", id: "olive_pollen" }, { name: "Bok", id: "ragweed_pollen" }
        ];

        // List
        $("pollenContainer").innerHTML = types.map((p, i) => {
          const val = data.hourly[p.id] ? data.hourly[p.id][12] : 0;
          const level = val > 50 ? 'H' : (val > 10 ? 'M' : 'L');
          const color = val > 50 ? '#f87171' : (val > 10 ? '#fbbf24' : '#34d399');
          const label = val > 50 ? 'Hög' : (val > 10 ? 'Måttlig' : 'Låg');
          return `
            <div class="pollen-row ${i > 2 ? 'pollen-extra' : ''}">
              <div style="width:70px" class="small fw-bold">${p.name}</div>
              <div class="pollen-bar"><div class="pollen-fill" style="width:${Math.min(val*2 + 5, 100)}%; background:${color}"></div></div>
              <div style="width:50px" class="small fw-bold text-end opacity-60">${label}</div>
            </div>`;
        }).join("");

        // Trend
        const trendHTML = [0, 24, 48, 72].map(h => {
          const d = new Date(data.hourly.time[h]);
          const val = data.hourly.birch_pollen[h] || 0;
          const level = val > 50 ? 'H' : (val > 10 ? 'M' : 'L');
          return `
            <div>
              <div class="small opacity-50 fw-bold">${h===0 ? 'Idag' : d.toLocaleDateString('sv-SE', {weekday:'short'})}</div>
              <div class="fw-bold fs-5 mt-1">${level}</div>
            </div>`;
        }).join("");
        $("pollenTrend").innerHTML = trendHTML;

      } catch (err) { console.error(err); }
    }

    let pollenOpen = false;
    function togglePollen() {
      pollenOpen = !pollenOpen;
      document.querySelectorAll('.pollen-extra').forEach(el => el.style.display = pollenOpen ? 'flex' : 'none');
      $("pBtn").innerHTML = pollenOpen ? 'Visa färre <i class="bi bi-chevron-up ms-1"></i>' : 'Visa alla 8 plantor <i class="bi bi-chevron-down ms-1"></i>';
    }

    // Search Logic
    let searchTimeout;
    $("searchInput").addEventListener("input", (e) => {
      clearTimeout(searchTimeout);
      const q = e.target.value.trim();
      if (q.length < 2) { $("searchResults").hidden = true; return; }

      searchTimeout = setTimeout(async () => {
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=sv&format=json`);
        const data = await res.json();
        if (!data.results) return;

        $("searchResults").innerHTML = data.results.map(r => `
          <div class="search-item" onclick="selectCity(${r.latitude}, ${r.longitude}, '${r.name}', '${r.country_code}')">
            <span class="fw-bold">${r.name}</span>, <span class="small opacity-70">${r.admin1 || r.country}</span>
          </div>
        `).join("");
        $("searchResults").hidden = false;
      }, 300);
    });

    function selectCity(lat, lon, name, country) {
      state = { lat, lon, name, country };
      $("searchResults").hidden = true;
      $("searchInput").value = "";
      fetchWeather();
      // Update URL for deep linking
      const url = new URL(window.location);
      url.searchParams.set('lat', lat);
      url.searchParams.set('lon', lon);
      url.searchParams.set('name', name);
      window.history.pushState({}, '', url);
    }

    // Init from URL
    const p = new URLSearchParams(window.location.search);
    if (p.get('lat')) {
      state = { 
        lat: parseFloat(p.get('lat')), 
        lon: parseFloat(p.get('lon')), 
        name: p.get('name'), 
        country: "SE" 
      };
    }

    fetchWeather();
  </script>
</body>
</html>
