<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kly.se – Vädret, helt enkelt.</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <header class="container py-3 kly-narrow">
    <div class="d-flex align-items-center justify-content-between gap-3">
      <a class="brand text-decoration-none text-white" href="/">
        <span class="brand-mark">kly.se</span>
        <div class="brand-tagline">Vädret, helt enkelt.</div>
      </a>
      <div class="search-wrap position-relative flex-grow-1">
        <div class="search-pill d-flex align-items-center gap-2">
          <i class="bi bi-search"></i>
          <input id="searchInput" class="search-input" type="text" placeholder="Sök stad..." autocomplete="off" />
        </div>
        <div id="searchResults" class="search-results" hidden></div>
      </div>
    </div>
  </header>

  <main class="container pb-5 kly-narrow">
    <section class="hero-card mt-3">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <h2 class="hero-location m-0" id="placeName">Laddar...</h2>
          <div class="hero-meta" id="placeCounty">Hämtar position...</div>
        </div>
        <i id="heroIcon" class="bi bi-cloud-sun hero-icon"></i>
      </div>

      <div class="d-flex align-items-end gap-3 mt-3">
        <div class="hero-temp"><span id="tempNow">--</span><span class="deg">°</span></div>
        <div class="pb-2">
          <div class="fw-bold fs-5" id="weatherCond">Vänta...</div>
          <div class="text-white-50 fw-semibold" id="feelsLike">--</div>
        </div>
      </div>

      <div class="pill-grid mt-4">
        <div class="mini-pill"><i class="bi bi-wind"></i> <span id="wind">--</span> m/s</div>
        <div class="mini-pill"><i class="bi bi-droplet"></i> <span id="humidity">--</span>% fukt</div>
        <div class="mini-pill"><i class="bi bi-sunrise"></i> <span id="sunrise">--:--</span></div>
        <div class="mini-pill"><i class="bi bi-sunset"></i> <span id="sunset">--:--</span></div>
        <div class="mini-pill"><i class="bi bi-sunglasses"></i> UV: <span id="uvLevel">--</span></div>
        <div class="mini-pill"><i class="bi bi-flower1"></i> Pollen: <span id="pollenHero">--</span></div>
        <div class="mini-pill"><i class="bi bi-cloud"></i> Moln: <span id="cloudCover">--</span>%</div>
      </div>
    </section>

    <div class="summary-line-box mt-3">
      <i class="bi bi-info-circle-fill me-2 text-white-50"></i>
      <span id="rainSummaryText">Sammanställer prognosen...</span>
    </div>

    <section class="mt-4 glass-card p-0 overflow-hidden">
      <div class="p-3 border-bottom border-white-10">
        <h3 class="fs-6 fw-bold m-0">10-dygnsprognos</h3>
      </div>
      <table class="table table-borderless text-white m-0 outlook-table">
        <thead>
          <tr class="small text-white-50 border-bottom border-white-10">
            <th class="ps-3">DAG</th>
            <th>VÄDER</th>
            <th class="text-end">MIN</th>
            <th class="text-end">MAX</th>
            <th class="text-end pe-3">NED.</th>
          </tr>
        </thead>
        <tbody id="outlookRows"></tbody>
      </table>
    </section>

    <footer class="mt-5 text-center text-white-50 small">
      © 2026 kly.se · Vädret, helt enkelt.
    </footer>
  </main>

  <script src="./app.js"></script>
</body>
</html>
