<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kungsbacka — kly</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body data-page="city" data-city="Kungsbacka">
  <div class="topbar">
    <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
      <a class="brand text-decoration-none text-reset" href="/">
        kly <small>— Väder, Pollen och UV.</small>
      </a>

      <div class="searchwrap ms-auto">
        <div class="search">
          <span class="icon-left" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="2"/>
              <path d="M16.2 16.2 21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>

          <input id="cityInput" type="text" autocomplete="off" placeholder="Sök stad (t.ex. Stockholm)" />

          <button class="icon-right" id="locBtn" title="Min plats" aria-label="Min plats">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M12 22s7-5.1 7-12a7 7 0 1 0-14 0c0 6.9 7 12 7 12Z" stroke="currentColor" stroke-width="2"/>
              <path d="M12 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" stroke="currentColor" stroke-width="2"/>
            </svg>
          </button>
        </div>
        
      </div>
    </div>
  </div>

  <div class="grid">
    <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
      <div class="small" style="color: rgba(20,24,32,.65); font-weight:600;">
        <span id="statusLine">—</span>
      </div>
      
    </div>

    

    <div class="row g-4">
      <div class="col-12 col-lg-4">
        <section class="cardx">
          <div class="head">
            <div class="title">
              <svg class="mini-ico" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M20 4s-7.5 1-12 5.5S3 20 3 20s10.9.5 15.5-4S20 4 20 4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <path d="M7 17c2-5 6-9 12-12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              Pollen
            </div>
            <span class="badge-pill" id="pollenBadge">—</span>
          </div>

          <div class="body">
            <div class="notice" id="pollenNotice">Inga aktiva pollen idag</div>
            <div class="list" id="pollenList"></div>
          </div>
        </section>
      </div>

      <div class="col-12 col-lg-5">
        <section class="cardx">
          <div class="head">
            <div class="title">
              <svg class="mini-ico" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M7 18h10a4 4 0 0 0 0-8 5.5 5.5 0 0 0-10.5-1.5A3.5 3.5 0 0 0 7 18Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              </svg>
              Väder idag
            </div>
            <span class="badge-pill badge-neutral" id="wxBadge">—</span>
          </div>

          <div class="body">
            <div class="temp-line">
              <div class="temp"><span id="wxTemp">—</span><small>°C</small></div>
              <div class="summary-inline" id="wxSummary">—</div>
            </div>
            <div class="feels">Känns som <span id="wxFeels">—</span>°</div>

            <div class="hourly" id="hourlyStrip" aria-label="Timprognos"></div>

            <div class="details">
              <div class="dline">
                <svg class="di" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M7 16a4 4 0 0 1 0-8 5.5 5.5 0 0 1 10.5-1.5A4 4 0 0 1 17 16" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <path d="M8 19v2M12 19v2M16 19v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span id="wxPrecip">—</span>
              </div>

              <div class="dline">
                <svg class="di" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M14 8l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span id="wxWind">—</span>
              </div>

              <div class="dline">
                <svg class="di" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 2s6 7 6 12a6 6 0 1 1-12 0c0-5 6-12 6-12Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>
                <span id="wxHum">—</span>
              </div>
            </div>

            <div class="segwrap">
              <div class="seg" role="tablist" aria-label="Välj vy">
                <button id="btnHour" class="active" type="button" role="tab" aria-selected="true">Timme</button>
                <button id="btn7d" type="button" role="tab" aria-selected="false">7 dagar</button>
              </div>
            </div>

            <div id="sevenDays" class="mt-3" style="display:none;">
              <div class="uv-box" id="sevenDaysBox"></div>
            </div>
          </div>
        </section>
      </div>

      <div class="col-12 col-lg-3">
        <section class="cardx">
          <div class="head">
            <div class="title">
              <svg class="mini-ico" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 3v2M12 19v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z" stroke="currentColor" stroke-width="2"/>
              </svg>
              UV-index
            </div>
            <span class="badge-pill badge-green" id="uvBadge">—</span>
          </div>

          <div class="body">
            <div class="uv-main">
              <div class="uv-val" id="uvNow">—</div>
              <div class="uv-now">nu</div>
            </div>

            <div class="uv-box">
              <div class="kv"><span>Max idag</span><strong id="uvMax">—</strong></div>
              <div class="kv"><span>Tid</span><strong id="uvMaxTime">—</strong></div>
              <div class="kv"><span>Risk</span><strong id="uvRisk">—</strong></div>
            </div>

            <div class="advice" id="uvAdvice">—</div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <footer class="footerbar">
    <div class="footer-inner">
      <div>© 2026 kly. Alla rättigheter förbehållna.</div>
      <div class="foot-muted">Källor: Open‑Meteo (väder, UV, pollen).</div>
    </div>
  </footer>

  <script src="/assets/app.js"></script>
  

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
          crossorigin="anonymous"></script>
</body>
</html>
